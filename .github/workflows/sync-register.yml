name: KBO 1군 등록 현황 싱크

on:
  schedule:
    # 매일 UTC 00:00 (KST 09:00) — 시즌 중 1군 등록 반영
    - cron: '0 0 * * *'
  workflow_dispatch:
    inputs:
      date:
        description: '날짜 (YYYYMMDD, 비워두면 최신)'
        default: ''

jobs:
  sync-register:
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run sync-register
        env:
          SYNC_SECRET: ${{ secrets.SYNC_SECRET }}
        run: |
          DATE="${{ github.event.inputs.date }}"
          API_URL="https://api.lineup.prmtwiki.com"
          if [ -n "$DATE" ]; then
            npx tsx scripts/sync-register.ts "$DATE" "$API_URL"
          else
            npx tsx scripts/sync-register.ts "$API_URL"
          fi

      - name: Notify
        if: always()
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          STATUS="${{ job.status }}"
          EMOJI=$([[ "$STATUS" == "success" ]] && echo "✅" || echo "❌")
          if [ -n "$TELEGRAM_BOT_TOKEN" ]; then
            curl -s "https://api.telegram.org/bot${TELEGRAM_BOT_TOKEN}/sendMessage" \
              -d chat_id="${TELEGRAM_CHAT_ID}" \
              -d parse_mode="HTML" \
              -d text="${EMOJI} <b>1군 등록 싱크 ${STATUS}</b>" || true
          fi
