name: 나무위키 URL 연동

on:
  workflow_dispatch:
    inputs:
      mode:
        description: '모드 선택'
        type: choice
        options:
          - new
          - recheck
          - verify
        default: 'new'

jobs:
  resolve-namu:
    runs-on: ubuntu-latest
    timeout-minutes: 120

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Resolve NamuWiki URLs
        env:
          SYNC_SECRET: ${{ secrets.SYNC_SECRET }}
        run: |
          MODE="${{ github.event.inputs.mode }}"
          FLAGS=""
          if [ "$MODE" = "recheck" ]; then FLAGS="--recheck"; fi
          if [ "$MODE" = "verify" ]; then FLAGS="--verify"; fi
          npx tsx scripts/resolve-namuwiki.ts $FLAGS https://api.lineup.prmtwiki.com

      - name: Notify
        if: always()
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          STATUS="${{ job.status }}"
          EMOJI=$([[ "$STATUS" == "success" ]] && echo "✅" || echo "❌")
          if [ -n "$TELEGRAM_BOT_TOKEN" ]; then
            curl -s "https://api.telegram.org/bot${TELEGRAM_BOT_TOKEN}/sendMessage" \
              -d chat_id="${TELEGRAM_CHAT_ID}" \
              -d parse_mode="HTML" \
              -d text="${EMOJI} <b>나무위키 URL 연동 ${STATUS}</b> (mode: ${{ github.event.inputs.mode }})" || true
          fi
